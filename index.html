const STORAGE_KEY = 'tm_press_hidden';

function getHidden() {
  try { return new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]')); }
  catch { return new Set(); }
}
function saveHidden(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...s]));
}

function hideCard(url) {
  const hidden = getHidden();
  hidden.add(url);
  saveHidden(hidden);
  const el = document.querySelector(`[data-url="${CSS.escape(url)}"]`);
  if (el) el.classList.add('hidden-card');
  updateHiddenCount();
}

function restoreAll() {
  localStorage.removeItem(STORAGE_KEY);
  document.querySelectorAll('.hidden-card').forEach(el => el.classList.remove('hidden-card'));
  updateHiddenCount();
}

function updateHiddenCount() {
  const n = getHidden().size;
  const el = document.getElementById('hidden-count');
  el.textContent = n > 0 ? `${n} result${n>1?'s':''} hidden` : '';
}

function filterSection(type) {
  document.querySelectorAll('section').forEach(sec => {
    const id = sec.dataset.type;
    sec.style.display = (type === 'all' || type === id) ? '' : 'none';
  });
}

function renderDate(item) {
  if (item.date_label) {
    return `<span class="card-date">${item.date_label}</span>`;
  }
  return `<span class="card-date unknown">Date unknown</span>`;
}

function renderCard(url, item) {
  const snippet = item.snippet.length > 180
    ? item.snippet.slice(0, 177) + '…' : item.snippet;
  const query = item.query.replace(/"/g, '');
  return `
    <div class="card-wrap" data-url="${url}" data-type="${item._type}">
      <button class="delete-btn" onclick="event.preventDefault();hideCard('${url.replace(/'/g,"\'")}');" title="Hide this result">×</button>
      <a href="${url}" target="_blank" rel="noopener" class="card">
        <div class="card-domain">${item.domain}</div>
        <div class="card-title">${item.title || url}</div>
        <div class="card-snippet">${snippet}</div>
        <div class="card-footer">
          ${renderDate(item)}
          <span class="card-query">Found via: ${query}</span>
        </div>
      </a>
    </div>`;
}

function renderSection(label, type, items) {
  const entries = Object.entries(items).sort((a, b) => {
    // Sort by date desc, then domain
    if (b[1].date_ts !== a[1].date_ts) return b[1].date_ts - a[1].date_ts;
    return a[1].domain.localeCompare(b[1].domain);
  });
  if (!entries.length) return '';

  const cards = entries.map(([url, item]) => {
    item._type = type;
    return renderCard(url, item);
  }).join('');

  return `
  <section data-type="${type}">
    <div class="section-header">
      <span class="section-title">${label}</span>
      <span class="section-count">${entries.length} results</span>
    </div>
    <div class="card-grid">${cards}</div>
  </section>`;
}

function init() {
  const hidden = getHidden();

  // Stats
  const total = Object.values(DATA).reduce((s,v) => s + Object.keys(v).length, 0);
  document.getElementById('hero-meta').textContent =
    `Generated ${DATA.generated_at} · ${total} unique mentions found`;
  document.getElementById('footer-date').textContent = DATA.generated_at;

  document.getElementById('stat-block').innerHTML = `
    <div class="stat-item"><div class="num">${Object.keys(DATA.press).length}</div><div class="lbl">Press</div></div>
    <div class="stat-item"><div class="num">${Object.keys(DATA.social).length}</div><div class="lbl">Social</div></div>
    <div class="stat-item"><div class="num">${Object.keys(DATA.other).length}</div><div class="lbl">Other</div></div>
  `;

  // Sections
  const body = document.getElementById('main-body');
  body.innerHTML =
    renderSection('Press & Media', 'press', DATA.press) +
    renderSection('Social & Community', 'social', DATA.social) +
    renderSection('Other Web Mentions', 'other', DATA.other) +
    renderSection('Own Website', 'own', DATA.own);

  // Apply hidden
  hidden.forEach(url => {
    const el = document.querySelector(`[data-url="${CSS.escape(url)}"]`);
    if (el) el.classList.add('hidden-card');
  });
  updateHiddenCount();
}

document.addEventListener('DOMContentLoaded', init);
</script>
